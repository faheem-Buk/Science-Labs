<!-- Place this directly under your page title -->
<div id="dualBox"
     style="
        position: relative;
        width: 70%;
        margin: 20px auto;
        display: flex;
        gap: 10px;
     ">

    <!-- Close Button -->
    <button onclick="document.getElementById('dualBox').style.display='none';"
        style="
            position: absolute;
            top: -10px;
            right: -10px;
            background: #4ec9f0;
            color: white;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 4px rgba(0,0,0,0.2);
        ">
        ×
    </button>

    <!-- English Box -->
    <textarea
        style="
            width: 50%;
            height: 350px;
            direction: ltr;
            text-align: left;
            padding: 10px;
            font-size: 16px;
            box-sizing: border-box;
            resize: vertical;
        "
    >Experience and Teaching Foundations
This project is built on experience accumulated from a background in aviation engineering, computer science, and more than 30 years of teaching. Aviation engineering contributed precision, discipline, and systems-thinking. Computer science added analytical depth and structured problem-solving. Decades of teaching transformed these skills into clear, practical, learner-focused methods.

A significant part of this experience was shaped during my years lecturing cryptography at Griffith College in Dublin in Ireland. The college provided a supportive, respectful, and intellectually rich teaching environment — one that valued clarity, academic integrity, and student-centered learning. The positive atmosphere, professional recognition, and collaborative culture at Griffith College played an important role in refining my approach to teaching and educational design.</textarea>

    <!-- Arabic Box -->
    <textarea
        style="
            width: 50%;
            height: 350px;
            direction: rtl;
            text-align: right;
            padding: 10px;
            font-size: 18px;
            font-family: 'Amiri', serif;
            box-sizing: border-box;
            resize: vertical;
        "
    >الخبرة وأسس التدريس
يعتمد هذا المشروع على خبرة متراكمة من خلفية في هندسة الطيران وعلوم الحاسوب وأكثر من 30 عامًا من التدريس. فقد أضافت هندسة الطيران الدقة والانضباط والتفكير المنهجي، بينما قدّمت علوم الحاسوب عمقًا تحليليًا وحلولًا منظمة للمشكلات. أما عقود التدريس فقد حولت هذه المهارات إلى أساليب تعليمية واضحة وعملية تتمحور حول المتعلّم.

وقد تشكّل جزء مهم من هذه الخبرة خلال سنوات تدريسي لعلم التشفير في كلية غريفيث في دبلن في إيرلندا. فقد وفّرت الكلية بيئة تعليمية داعمة ومحترمة وغنية أكاديميًا — بيئة تقدّر الوضوح والنزاهة الأكاديمية وتركيزها على الطالب. وقد ساهم الجو الإيجابي والاحترام المهني والثقافة التعاونية في كلية غريفيث بدور كبير في صقل منهجيتي في التدريس وتصميم المواد التعليمية.</textarea>

</div>


<!-- ABOUT PROJECT MODAL -->
<div id="aboutProjectModal" style="
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:66%;
    height:100%;
    background:rgba(0,0,0,0.6);
    z-index:9999;
">
    <div style="
        background:white;
        height:100%;
        padding:20px;
        overflow-y:auto;
    ">
        <span class="closeAboutProject" style="
            float:right;
            font-size:28px;
            cursor:pointer;
        ">&times;</span>

        <h2>About This Project</h2>
        <p>Your text goes here...</p>
    </div>
</div>


<!-- SCRIPT FOR MODAL -->
<script>
    const aboutModal = document.getElementById("aboutProjectModal");
    const closeAbout = document.querySelector(".closeAboutProject");

    function openAboutProject() {
        aboutModal.style.display = "block";
    }

    closeAbout.onclick = function() {
        aboutModal.style.display = "none";
    }

    window.onclick = function(event) {
        if (event.target === aboutModal) {
            aboutModal.style.display = "none";
        }
    }
</script>
