<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cryptography Tools</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            text-align: center;
        }

        .header-image {
            width: 100%;
            max-width: 900px;
            margin-top: 20px;
        }

        .signature-image {
            width: 100%;
            max-width: 500px;
            margin-top: 10px;
        }

        .message-image {
            width: 100%;
            max-width: 600px;
            margin-top: 20px;
        }

        /* TOOL GRID */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            text-align: center;
            margin: 40px auto;
            max-width: 900px;
        }

        .tool-item {
            text-decoration: none;
            color: #000;
        }

        .tool-item img {
            width: 100%;
            max-width: 180px;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
        }

        .tool-label {
            margin-top: 8px;
            font-size: 1.1rem;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <!-- WELCOME IMAGE (unchanged) -->
    <img src="assets/images/welcome.png" class="header-image" alt="Welcome">

    <!-- SIGNATURE IMAGE (unchanged) -->
    <img src="assets/images/signature.png" class="signature-image" alt="Signature">

    <!-- MESSAGE IMAGE (unchanged) -->
    <img src="assets/images/message.png" class="message-image" alt="Message">

    <!-- CLEAN 6‑TOOL GRID (new, final) -->
    <div class="tools-grid">

        <!-- Caesar Arabic -->
        <a class="tool-item" href="tools/caesar_arabic.html">
            <img src="assets/images/caesar_arabic.png" alt="Caesar Arabic Tool">
            <div class="tool-label">Caesar Cipher (Arabic)</div>
        </a>

        <!-- Caesar English -->
        <a class="tool-item" href="tools/caesar_english.html">
            <img src="assets/images/caesar_english.png" alt="Caesar English Tool">
            <div class="tool-label">Caesar Cipher (English)</div>
        </a>

        <!-- Vigenere -->
        <a class="tool-item" href="tools/vigenere.html">
            <img src="assets/images/vigenere.png" alt="Vigenere Tool">
            <div class="tool-label">Vigenère Cipher</div>
        </a>

        <!-- Playfair -->
        <a class="tool-item" href="tools/playfair.html">
            <img src="assets/images/playfair.png" alt="Playfair Tool">
            <div class="tool-label">Playfair Cipher</div>
        </a>

        <!-- Columnar Transposition -->
        <a class="tool-item" href="tools/column_trans_eng_v25.html">
            <img src="assets/images/column_trans_cipher.png" alt="Columnar Transposition Tool">
            <div class="tool-label">Columnar Transposition</div>
        </a>

        <!-- Rail Fence -->
        <a class="tool-item" href="tools/rail_fence.html">
            <img src="assets/images/rail_fence.png" alt="Rail Fence Tool">
            <div class="tool-label">Rail Fence Cipher</div>
        </a>

    </div>

</body>
</html>
