<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scientific Tools</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f5f5f5;
    }

    /* MAIN TWO-COLUMN LAYOUT */
    .container {
        display: grid;
        grid-template-columns: 66% 34%;
        width: 100%;
        height: 100vh;
        overflow: hidden;
    }

    /* LEFT SIDE */
    .left {
        padding: 30px;
        overflow-y: auto;
        background: white;
    }

    .title {
        font-size: 32px;
        font-weight: bold;
        margin-bottom: 25px;
        text-align: center;
    }

    /* TOOL GRID: 3 per row */
    .tools-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 25px;
        padding: 10px;
    }

    .tool-box {
        background: #e8e8e8;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
    }

    .tool-box:hover {
        background: #d0d0d0;
    }

    /* RIGHT SIDE IMAGE */
    .right {
        width: 100%;
        height: 100%;
        overflow: hidden;
    }

    .right img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
</style>

</head>
<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
        <div class="title">Scientific Tools</div>

        <div class="tools-grid">
            <div class="tool-box">Tool 1</div>
            <div class="tool-box">Tool 2</div>
            <div class="tool-box">Tool 3</div>
            <div class="tool-box">Tool 4</div>
            <div class="tool-box">Tool 5</div>
            <div class="tool-box">Tool 6</div>
        </div>
    </div>

    <!-- RIGHT SIDE IMAGE -->
    <div class="right">
        <img src="your-2025-photo.jpg" alt="Faheem 2025">
    </div>

</div>

</body>
</html>
