<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Science Labs Tools</title>

    <!-- Correct CSS path -->
    <link rel="stylesheet" href="assets/CSS/main.css">
</head>

<body>

<header>
    <h1>Science Labs Tools</h1>
    <p>Select a tool to begin</p>
</header>

<div class="tools-container">

    <div class="tool-card" onclick="openTool('tools/column_trans_eng_25.html')">
        <img src="assets/images/column_trans_icon.png" alt="Columnar Cipher">
        <h3>Columnar Transposition</h3>
        <p>Encrypt & decrypt using columnar transposition</p>
    </div>

    <div class="tool-card" onclick="openTool('tools/caesar_english.html')">
        <img src="assets/images/signature_small.png" alt="Caesar English">
        <h3>Caesar Cipher (English)</h3>
        <p>Shift letters and decode messages</p>
    </div>

    <div class="tool-card" onclick="openTool('tools/caesar_arabic.html')">
        <img src="assets/images/signature_small.png" alt="Caesar Arabic">
        <h3>Caesar Cipher (Arabic)</h3>
        <p>Shift Arabic letters and decode messages</p>
    </div>

</div>

<script>
    function openTool(path) {
        window.location.href = path;
    }
</script>

</body>
</html>
