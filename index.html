<!DOCTYPE html>

<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <title>Faheem 2025 Science Lab</title>

  <link rel="stylesheet" href="./Faheem 2025 Science Lab 2026-05-06 Normal  _files/main.css">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .left-column {
      width: 66%;
      padding: 25px;
      overflow-y: auto;
      box-sizing: border-box;
    }

    .right-column {
      width: 34%;
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0;
      box-sizing: border-box;
    }

    .right-column img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .tool-buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 25px;
      justify-items: center;
      margin-top: 30px;
    }

    .tool-buttons img {
      width: 250px;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .tool-buttons img:hover {
      transform: scale(1.05);
      box-shadow: 0 0 12px rgba(0,0,0,0.25);
    }

    .tool-label {
      text-align: center;
      margin-top: 8px;
      font-size: 18px;
      font-weight: bold;
      color: #222;
      cursor: pointer;
    }

    .tool-link {
      text-decoration: none;
      color: inherit;
    }

    footer {
      margin-top: 40px;
      text-align: center;
    }
  </style>
</head>

<body>
