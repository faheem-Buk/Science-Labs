<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faheem 2025 Science Lab</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            background: #222;
            color: white;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
        }

        .tools-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 30px;
            gap: 25px;
        }

        .tool-card {
            background: white;
            width: 220px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: 0.2s;
        }

        .tool-card:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 14px rgba(0,0,0,0.25);
        }

        .tool-card img {
            width: 180px;
            height: auto;
            border-radius: 8px;
        }

        .tool-card p {
            margin-top: 10px;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<header>
    Faheem 2025 Science Lab
</header>

<div class="tools-container">

    <!-- Column Transposition Cipher Tool -->
    <div class="tool-card">
        <a href="Column transpositin Eng html V22.html">
            <img src="assets/help_files/column_trans_cipher.png"
                 alt="Column Transposition Cipher">
        </a>
        <p>Column Transposition Cipher</p>
    </div>

</div>

</body>
</html>
