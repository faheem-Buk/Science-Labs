<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cryptography Tools</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #333;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .tool-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }
        .tool-card {
            background-color: white;
            width: 280px;
            margin: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            text-align: center;
            transition: 0.3s;
        }
        .tool-card:hover {
            transform: translateY(-5px);
        }
        .tool-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        .tool-card h3 {
            padding: 15px 0;
        }
        .tool-card a {
            display: block;
            padding: 12px;
            background-color: #333;
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        .tool-card a:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

<header>
    <h1>Cryptography Tools</h1>
</header>

<div class="tool-container">

    <div class="tool-card">
        <img src="caesar_english.png" alt="Caesar Cipher English">
        <h3>Caesar Cipher (English)</h3>
        <a href="caesar.html">Open Tool</a>
    </div>

    <div class="tool-card">
        <img src="vigenere.png" alt="Vigenere Cipher">
        <h3>Vigenère Cipher</h3>
        <a href="vigenere.html">Open Tool</a>
    </div>

    <div class="tool-card">
        <img src="playfair_english.png" alt="Playfair English">
        <h3>Playfair Cipher (English)</h3>
        <a href="playfair_english.html">Open Tool</a>
    </div>

    <div class="tool-card">
        <img src="playfair_arabic.png" alt="Playfair Arabic">
        <h3>Playfair Cipher (Arabic)</h3>
        <a href="playfair_arabic.html">Open Tool</a>
    </div>

</div>

</body>
</html>
