<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Columnar Transposition Workpad</title>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
}

.page-container {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

.left-column {
  width: 66%;
  padding: 25px;
  overflow-y: auto;
  box-sizing: border-box;
  background-color: #ffe6f2;
}

.right-column {
  width: 34%;
  background-color: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 0;
  box-sizing: border-box;
}

.right-column img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.title-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}

label { display: inline-block; margin-bottom: 2px; }
input[type="text"] { width: 100%; box-sizing: border-box; }
textarea { width: 100%; box-sizing: border-box; margin-top: 0; }

h3 {
  font-size: 18px;
  margin-top: 6px;
  margin-bottom: 4px;
}

.internal-right h3 {
  margin-bottom: 4px;
}

.controls button { margin: 2px; }
button.wideBtn { width: 240px; }

table { border-collapse: collapse; margin-top: 4px; }
th, td {
  border: 1px solid #000;
  width: 30px;
  height: 26px;
  text-align: center;
  font-size: 16px;
}

.key-label { color: red; font-weight: bold; }

.internal-table {
  width: 100%;
  display: table;
  margin-top: 10px;
}

.internal-left {
  display: table-cell;
  width: 33%;
  vertical-align: top;
  padding-right: 10px;
}

.internal-right {
  display: table-cell;
  width: 33%;
  vertical-align: top;
}

.bottom-buttons {
  margin-top: 40px;
  padding-top: 20px;
  border-top: 1px solid #ccc;
}

.prettySeparator {
  width: 240px;
  margin: 10px 0 6px 0;
  display: block;
  background-color: #ffb3d9;
  color: #ffb3d9;
  border: 1px solid #ff99cc;
  cursor: default;
}

input[type="text"],
textarea {
  background-color: #ffe6f2;
}

table td,
table th {
  background-color: #ffe6f2;
}

.modeActive {
  border: 2px solid red !important;
  box-shadow: 0 0 4px red;
}
</style>
</head>

<body>

<div class="page-container">

  <div class="left-column">

    <div class="title-row">
      <h2 style="margin:0;">Columnar Transposition Workpad</h2>
      <button onclick="openHelp()">Help</button>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center;">
      <label for="message">Enter the Input Message:</label>
      <span id="msgLength">Message length (not counting spaces): 0</span>
    </div>

    <input type="text" id="message" oninput="updateMessageLength()">

    <div class="internal-table">

      <div class="internal-left">

        <div style="margin-top:4px; display:flex; align-items:center; gap:8px;">
          <label for="password">Password Text:</label>
          <input type="text" id="password" maxlength="10" style="flex:1;">
        </div>

        <div style="margin-top:4px; display:flex; align-items:center; gap:8px;">
          <label for="numKey">Numerical Key:</label>
          <input type="text" id="numKey" maxlength="10" style="flex:1;">
        </div>

        <div style="margin-top:6px; display:flex; align-items:center;">
          <div>
            <label>Rows (1..10):</label>
            <input type="text" id="rows" maxlength="2"
                   oninput="validateRowCol(this)"
                   style="width:45px; text-align:center;">
          </div>

          <div style="width:40px;"></div>

          <div>
            <label>Col (1..10):</label>
            <input type="text" id="cols" maxlength="2"
                   oninput="validateRowCol(this)"
                   style="width:45px; text-align:center;">
          </div>
        </div>

        <div class="controls" style="margin-top:10px;">

          <button class="wideBtn" onclick="refreshTable()">Refresh Table</button>

          <button class="wideBtn" onclick="fillRows()">Fill table Row by Row</button>

          <button class="wideBtn"
                  id="colModeFillBtn"
                  onclick="toggleAddMode()">
            Fill table Column by Column
          </button>

          <button onclick="addFiller()" style="width:120px;">Add Fill</button>
          <input type="text" id="fillerChar" value="X" maxlength="1" style="width:22px; text-align:center;">

          <button class="prettySeparator" disabled>──────────────</button>

          <button class="wideBtn" id="colModeEmptyBtn" onclick="toggleExtractMode()">
            Write out A Column at a time
          </button>

          <button class="wideBtn" onclick="writeAllRows()">Write out Rows</button>
          <button class="wideBtn" onclick="undoLast()">Undo Last action</button>
          <button class="wideBtn" onclick="clearFinalMessage()">Clear Final Message</button>

          <button class="prettySeparator" disabled>──────────────</button>

        </div>
      </div>

      <div class="internal-right">

<h3 style="margin:2px 0;">Key Row</h3>
<table id="keyRow" style="margin:0; border-collapse:collapse;"><tbody></tbody></table>

<h3 id="matrixHeader" style="margin:4px 0;">
    Matrix 


<span id="arrowSymbol"
      style="margin-left:10px; font-size:16px; color:#000 !important; cursor:pointer;"
      onclick="toggleArrowDirection()"
>→</span>



</h3>
<table id="matrix" style="margin:0; border-collapse:collapse;"><tbody></tbody></table>





      </div>

    </div>

    <h3>Final Message</h3>
    <textarea id="cipher" style="height:28px; line-height:20px;"></textarea>

    <h3>Rough Work Notes</h3>
    <textarea id="notes" style="height:70px;"></textarea>

    <div class="bottom-buttons">
      <button onclick="giveMeMessage()">Give me a message</button>
      <button onclick="checkMyWork(document.getElementById('cipher').value)">Check My Work</button>
      <button onclick="window.location.href='../index.html'">Return to Front Room</button>
    </div>

  </div>

  <div class="right-column">
    <img src="../assets/images/invigilator_flipped.png" alt="Invigilator">
  </div>

</div>

<script>
/* ---------- BEGIN JAVASCRIPT ---------- */

let lastHighlightedColumn = null;
let mode = "N";
let arrowDirection = "R";
let cipherForAdd = "";
let addIndex = 0;
let prevRowColValue = "1";

function validateRowCol(box) {
  let v = box.value.replace(/\D/g, "");
  if (v === "") { box.value = ""; return; }
  if (v.length === 1 && v >= "1" && v <= "9") { prevRowColValue = v; box.value = v; return; }
  if (v === "10") { prevRowColValue = "10"; box.value = "10"; return; }
  box.value = prevRowColValue;
}

function updateMessageLength() {
  const box = document.getElementById("message");
  const span = document.getElementById("msgLength");
  if (!box || !span) return;

  const cleaned = box.value.replace(/\s/g, "");
  span.textContent = "Message length (not counting spaces): " + cleaned.length;
}

/* END OF PATCHED PART 1 */
function getMatrixCells() {
  return document.querySelector("#matrix tbody").rows;
}

function clearMatrixContent() {
  const rows = getMatrixCells();
  for (let r = 0; r < rows.length; r++) {
    const cells = rows[r].cells;
    for (let c = 0; c < cells.length; c++) {
      cells[c].innerText = "";
    }
  }
}

function disableAllClicks() {
  const cells = document.querySelectorAll("#matrix td");
  cells.forEach(cell => {
    cell.onclick = null;
    cell.style.cursor = "default";
  });
}

function setupKeyRowAutoAdvance() {
  const keyCells = document.querySelectorAll("#keyRow td");
  keyCells.forEach((cell, index) => {
    cell.oninput = () => {
      let text = cell.innerText.trim();
      if (text.length > 1) { text = text[0]; cell.innerText = text; }
      if (text.length === 1 && index < keyCells.length - 1) {
        keyCells[index + 1].focus();
      }
    };
    cell.onkeydown = (e) => {
      if (e.key === "Backspace" && cell.innerText === "" && index > 0) {
        keyCells[index - 1].focus();
      }
    };
  });
}

function clearModeButtons() {
  document.getElementById("colModeFillBtn")?.classList.remove("modeActive");
  document.getElementById("colModeEmptyBtn")?.classList.remove("modeActive");
}

function setMode(newMode) {
  mode = newMode;
  clearModeButtons();

  if (mode === "A") {
    document.getElementById("colModeFillBtn")?.classList.add("modeActive");
    disableTyping();
    enableAddColumnMode();
    return;
  }

  if (mode === "E") {
    document.getElementById("colModeEmptyBtn")?.classList.add("modeActive");
    disableTyping();
    enableExtractColumnMode();
    return;
  }

  disableAllClicks();
  enableTyping();
}

function toggleAddMode() {
  if (mode === "A") setMode("N");
  else setMode("A");
}

function toggleExtractMode() {
  if (mode === "E") setMode("N");
  else setMode("E");
}

function toggleDirection() {
  const btn = document.getElementById("directionBtn");
  if (!btn) return;
  if (arrowDirection === "R") {
    arrowDirection = "D";
    btn.innerHTML = "⬇";
  } else {
    arrowDirection = "R";
    btn.innerHTML = "➜";
  }
}

function refreshTable() {
  const rowsVal = parseInt(document.getElementById("rows").value, 10);
  const colsVal = parseInt(document.getElementById("cols").value, 10);

  if (!rowsVal || !colsVal) return;

  document.getElementById("cipher").value = "";

  lastHighlightedColumn = null;
  clearModeButtons();

  const keyBody = document.querySelector("#keyRow tbody");
  const matrixBody = document.querySelector("#matrix tbody");
  keyBody.innerHTML = "";
  matrixBody.innerHTML = "";

  const keyRow = document.createElement("tr");
  for (let c = 0; c < colsVal; c++) {
    const cell = document.createElement("td");
    cell.contentEditable = "true";
    cell.classList.add("key-label");
    keyRow.appendChild(cell);
  }
  keyBody.appendChild(keyRow);

  for (let r = 0; r < rowsVal; r++) {
    const row = document.createElement("tr");
    for (let c = 0; c < colsVal; c++) {
      const cell = document.createElement("td");
      cell.contentEditable = "true";
      row.appendChild(cell);
    }
    matrixBody.appendChild(row);
  }

  setupKeyRowAutoAdvance();
  setMode("N");

  const arrow = document.getElementById("directionBtn");
  if (arrow) arrow.style.display = "inline-block";
}

function fillRows() {
  let msg = document.getElementById("message").value.replace(/\s+/g, "");
  const rows = getMatrixCells();
  if (!rows.length) return;

  clearMatrixContent();

  let index = 0;
  for (let r = 0; r < rows.length; r++) {
    const cells = rows[r].cells;
    for (let c = 0; c < cells.length; c++) {
      cells[c].innerText = msg[index] || "";
      index++;
    }
  }
}

function addFiller() {
  const filler = document.getElementById("fillerChar")?.value || "X";
  const rows = getMatrixCells();

  for (let r = 0; r < rows.length; r++) {
    const cells = rows[r].cells;
    for (let c = 0; c < cells.length; c++) {
      if (cells[c].innerText.trim() === "") {
        cells[c].innerText = filler;
      }
    }
  }
}

function appendToCipher(text) {
  const box = document.getElementById("cipher");
  box.value += text;
}

function undoLast() {
  const box = document.getElementById("cipher");
  box.value = box.value.slice(0, -1);
}

function highlightColumn(colIndex) {
  const rows = getMatrixCells();

  if (lastHighlightedColumn !== null) {
    for (let r = 0; r < rows.length; r++) {
      rows[r].cells[lastHighlightedColumn].style.backgroundColor = "";
    }
  }

  for (let r = 0; r < rows.length; r++) {
    rows[r].cells[colIndex].style.backgroundColor = "#ffff99";
  }

  lastHighlightedColumn = colIndex;
}

function enableAddColumnMode() {
  cipherForAdd = document.getElementById("message").value.replace(/\s+/g, "");
  addIndex = 0;

  const rows = getMatrixCells();
  if (!rows.length) return;

  const rowCount = rows.length;
  const colCount = rows[0].cells.length;

  disableAllClicks();

  for (let c = 0; c < colCount; c++) {
    for (let r = 0; r < rowCount; r++) {
      const cell = rows[r].cells[c];
      cell.style.cursor = "pointer";
      cell.onclick = () => fillColumn(c);
    }
  }
}

function fillColumn(colIndex) {
  const rows = getMatrixCells();
  if (!rows.length) return;

  highlightColumn(colIndex);

  for (let r = 0; r < rows.length; r++) {
    if (addIndex < cipherForAdd.length) {
      rows[r].cells[colIndex].innerText = cipherForAdd[addIndex++];
    }
  }
}

function enableExtractColumnMode() {
  const rows = getMatrixCells();
  if (!rows.length) return;

  const rowCount = rows.length;
  const colCount = rows[0].cells.length;

  disableAllClicks();

  for (let c = 0; c < colCount; c++) {
    for (let r = 0; r < rowCount; r++) {
      const cell = rows[r].cells[c];
      cell.style.cursor = "pointer";
      cell.onclick = () => extractColumn(c);
    }
  }
}

function extractColumn(colIndex) {
  const rows = getMatrixCells();
  if (!rows.length) return;

  highlightColumn(colIndex);

  let result = "";
  for (let r = 0; r < rows.length; r++) {
    const text = rows[r].cells[colIndex].innerText.trim();
    if (text) result += text;
  }

  appendToCipher(result);
}

function enableTyping() {
  const rows = getMatrixCells();
  if (!rows.length) return;

  const totalRows = rows.length;
  const totalCols = rows[0].cells.length;

  for (let r = 0; r < totalRows; r++) {
    for (let c = 0; c < totalCols; c++) {
      const cell = rows[r].cells[c];
      cell.contentEditable = "true";
      cell.style.cursor = "text";
      cell.onclick = null;

      cell.oninput = () => {
        if (mode !== "N") return;

        let text = cell.innerText.trim();
        if (text.length > 1) {
          text = text[0];
          cell.innerText = text;
        }

        if (text.length === 1) {
          let nextR = r;
          let nextC = c;

          if (arrowDirection === "R") {
            if (c < totalCols - 1) {
              nextC = c + 1;
            } else if (r < totalRows - 1) {
              nextC = 0;
              nextR = r + 1;
            } else {
              nextR = 0;
              nextC = 0;
            }
          } else if (arrowDirection === "D") {
            if (r < totalRows - 1) {
              nextR = r + 1;
            } else if (c < totalCols - 1) {
              nextR = 0;
              nextC = c + 1;
            } else {
              nextR = 0;
              nextC = 0;
            }
          }

          rows[nextR].cells[nextC].focus();
        }
      };

      cell.onkeydown = (e) => {
        if (mode !== "N") return;

        if (e.key === "Backspace" && cell.innerText === "") {
          e.preventDefault();

          let prevR = r;
          let prevC = c;

          if (arrowDirection === "R") {
            if (c > 0) {
              prevC = c - 1;
            } else if (r > 0) {
              prevR = r - 1;
              prevC = totalCols - 1;
            } else {
              prevR = totalRows - 1;
              prevC = totalCols - 1;
            }
          } else if (arrowDirection === "D") {
            if (r > 0) {
              prevR = r - 1;
            } else if (c > 0) {
              prevR = totalRows - 1;
              prevC = c - 1;
            } else {
              prevR = totalRows - 1;
              prevC = totalCols - 1;
            }
          }

          rows[prevR].cells[prevC].innerText = "";
          rows[prevR].cells[prevC].focus();
        }
      };
    }
  }
}

function disableTyping() {
  const rows = getMatrixCells();
  if (!rows.length) return;

  for (let r = 0; r < rows.length; r++) {
    for (let c = 0; c < rows[r].cells.length; c++) {
      const cell = rows[r].cells[c];
      cell.oninput = null;
      cell.onkeydown = null;
      cell.style.cursor = "default";
    }
  }
}

function clearFinalMessage() {
  document.getElementById("cipher").value = "";
}

function writeAllRows() {
  const rows = getMatrixCells();
  if (!rows.length) return;

  let result = "";
  for (let r = 0; r < rows.length; r++) {
    const cells = rows[r].cells;
    for (let c = 0; c < cells.length; c++) {
      const text = cells[c].innerText.trim();
      if (text) result += text;
    }
  }
  appendToCipher(result);
}

function checkMyWork(text) {
  alert("Check My Work:\n\n" + text);
}

function giveMeMessage() {
  alert("Give me a message: (placeholder)");
}

function openHelp() {
  alert("Help screen placeholder.");
}

window.onload = () => {
  document.getElementById("rows").value = "2";
  document.getElementById("cols").value = "2";
  refreshTable();
  arrowDirection = "R";
  updateMessageLength();
};
function toggleArrowDirection() {
    const arrow = document.getElementById("arrowSymbol");

    if (arrow.textContent.trim() === "→") {
        arrow.textContent = "↓";
        arrowDirection = "D";   // top-down mode
    } else {
        arrow.textContent = "→";
        arrowDirection = "R";   // left-right mode
    }
}


/* ---------- END JAVASCRIPT ---------- */
</script>

</body>
</html>
