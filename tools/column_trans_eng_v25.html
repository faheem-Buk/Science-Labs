<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Column Transposition Cipher</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 20px;
}

.container {
    width: 400px;
}

textarea, input {
    width: 100%;
    margin-bottom: 10px;
}

.buttons button {
    margin-right: 10px;
}

#helpWindow, #msgWindow {
    width: 250px;
    background: #f9f9f9;
    border: 2px solid #aaa;
    border-radius: 8px;
    padding: 0;
    position: absolute;
    top: 150px;
    left: 450px;
    display: none;
}

.header {
    background: #ddd;
    padding: 8px;
    cursor: move;
    font-weight: bold;
}

.content {
    padding: 10px;
}
</style>

</head>

<body>

<h2>Column Transposition Cipher</h2>

<div class="container">
    <label>Enter Message:</label>
    <textarea id="message" rows="4"></textarea>

    <label>Enter Key:</label>
    <input type="text" id="key">

    <div class="buttons">
        <button onclick="encrypt()">Encrypt</button>
        <button onclick="decrypt()">Decrypt</button>
    </div>

    <label>Output:</label>
    <textarea id="output" rows="4" readonly></textarea>
</div>

<button id="helpBtn" onclick="toggleHelp()">Help</button>

<div id="helpWindow" class="draggable">
    <div class="header" onmousedown="dragStart(event, 'helpWindow')">Help</div>
    <div class="content">
        <p>This tool performs Columnar Transposition Encryption and Decryption.</p>
        <p>Enter a message and a key. The key determines the column order.</p>
    </div>
</div>

<div id="msgWindow" class="draggable">
    <div class="header" onmousedown="dragStart(event, 'msgWindow')">Message</div>
    <div class="content" id="msgContent"></div>
</div>

<script>
function encrypt() {
    let msg = document.getElementById("message").value.replace(/ /g, "");
    let key = document.getElementById("key").value;

    if (!msg || !key) return showMsg("Please enter both message and key.");

    let keyOrder = getKeyOrder(key);
    let cols = key.length;
    let rows = Math.ceil(msg.length / cols);

    let matrix = [];
    let index = 0;

    for (let r = 0; r < rows; r++) {
        matrix[r] = [];
        for (let c = 0; c < cols; c++) {
            matrix[r][c] = msg[index] || "X";
            index++;
        }
    }

    let result = "";
    for (let k = 0; k < cols; k++) {
        let colIndex = keyOrder.indexOf(k);
        for (let r = 0; r < rows; r++) {
            result += matrix[r][colIndex];
        }
    }

    document.getElementById("output").value = result;
}

function decrypt() {
    let cipher = document.getElementById("message").value.replace(/ /g, "");
    let key = document.getElementById("key").value;

    if (!cipher || !key) return showMsg("Please enter both cipher text and key.");

    let keyOrder = getKeyOrder(key);
    let cols = key.length;
    let rows = Math.ceil(cipher.length / cols);

    let matrix = Array.from({ length: rows }, () => Array(cols).fill(""));

    let index = 0;
    for (let k = 0; k < cols; k++) {
        let colIndex = keyOrder.indexOf(k);
        for (let r = 0; r < rows; r++) {
            matrix[r][colIndex] = cipher[index];
            index++;
        }
    }

    let result = "";
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            result += matrix[r][c];
        }
    }

    document.getElementById("output").value = result;
}

function getKeyOrder(key) {
    return key.split("")
             .map((char, index) => ({ char, index }))
             .sort((a, b) => a.char.localeCompare(b.char))
             .map(obj => obj.index);
}

function toggleHelp() {
    let win = document.getElementById("helpWindow");
    win.style.display = win.style.display === "block" ? "none" : "block";
}

function showMsg(text) {
    let win = document.getElementById("msgWindow");
    document.getElementById("msgContent").innerText = text;
    win.style.display = "block";
}

let activeWindow = null;
let offsetX = 0, offsetY = 0;

function dragStart(e, id) {
    activeWindow = document.getElementById(id);
    offsetX = e.clientX - activeWindow.offsetLeft;
    offsetY = e.clientY - activeWindow.offsetTop;
    document.onmousemove = dragMove;
    document.onmouseup = dragStop;
}

function dragMove(e) {
    if (!activeWindow) return;
    activeWindow.style.left = (e.clientX - offsetX) + "px";
    activeWindow.style.top = (e.clientY - offsetY) + "px";
}

function dragStop() {
    activeWindow = null;
    document.onmousemove = null;
    document.onmouseup = null;
}
</script>

</body>
</html>
